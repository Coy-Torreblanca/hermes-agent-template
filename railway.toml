[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[variables]
SYNCTHING_DEVICE_ID = { description = "Device ID of the machine to sync with (from Syncthing UI → Actions → Show ID)", required = false }
SYNCTHING_FOLDER_PATH = { description = "Path inside the container to sync with the remote device", default = "/data/syncthing/Sync", required = false }
SYNCTHING_FOLDER_LABEL = { description = "Human-readable label for the synced folder (shown in Syncthing UI)", default = "Gbrain Sync", required = false }

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[volume]
mountPath = "/data"
sizeGB = 5
